<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad</title>
    <style>
        body {
            background-color: #050508;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .member {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            margin: 15px;
            padding: 20px;
            transition: transform 0.3s;
            width: 200px;
        }
        .member:hover {
            transform: scale(1.05);
        }
        h1 {
            color: #ff2d55;
            text-align: center;
        }
        .neon {
            text-shadow: 0 0 5px #ff2d55, 0 0 10px #ff2d55;
        }
        .button {
            background-color: #00f2ff;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .button:hover {
            background-color: #00ced1;
        }
    </style>
</head>
<body>
    <h1 class="neon">Our Squad</h1>
    <div class="container">
        <div class="member">
            <h2>Member 1</h2>
            <p>Role: Example Role</p>
        </div>
        <div class="member">
            <h2>Member 2</h2>
            <p>Role: Example Role</p>
        </div>
        <div class="member">
            <h2>Member 3</h2>
            <p>Role: Example Role</p>
        </div>
        <!-- Add more members as needed -->
    </div>
    <button class="button">Join Us!</button>
</body>
</html>
