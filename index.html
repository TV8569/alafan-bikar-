<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>ALAFAN BIKAR </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #0a0d1a;
      --bg-darker: #05070f;
      --neon-red: #e84444;
      --neon-cyan: #0dd9ff;
      --accent: #1a1f3a;
      --text-main: #e8e8e8;
      --text-light: #b8b8b8;
      --glass: rgba(255,255,255,.05);
      --card-radius: 20px;
      --smooth: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* ==== SUBTLE BACKGROUND EFFECT ==== */
    .bg-glow {
      position: fixed;
      width: 100vw;
      height: 100vh;
      left: 0;
      top: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .glow-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.08;
      mix-blend-mode: screen;
    }

    .blob-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--neon-red), transparent);
      top: -150px;
      left: -150px;
      animation: float1 20s ease-in-out infinite;
    }

    .blob-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--neon-cyan), transparent);
      bottom: -200px;
      right: -150px;
      animation: float2 24s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, -60px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-50px, 80px); }
    }

    /* ==== MAIN CONTAINER ==== */
    .container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      gap: 45px;
    }

    /* ==== HERO SECTION ==== */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      animation: fadeInDown 0.8s ease-out;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .main-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4.8rem);
      text-transform: uppercase;
      letter-spacing: 12px;
      background: linear-gradient(90deg, var(--neon-red) 0%, #fff 48%, var(--neon-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(232, 68, 68, 0.25));
      user-select: none;
      font-weight: 900;
    }

    .main-logo:hover {
      animation: glow-pulse 2s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 18px rgba(232, 68, 68, 0.25)); }
      50% { filter: drop-shadow(0 0 28px rgba(13, 217, 255, 0.3)); }
    }

    .tagline {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      letter-spacing: 6px;
      color: var(--neon-cyan);
      text-shadow: 0 0 12px rgba(13, 217, 255, 0.15);
      font-weight: 700;
      opacity: 0.85;
    }

    .description {
      font-size: 1rem;
      color: var(--text-light);
      text-align: center;
      max-width: 450px;
      line-height: 1.5;
      opacity: 0.75;
    }

    /* ==== MENU SECTION ==== */
    .menu-container {
      display: flex;
      gap: 28px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.9s ease-out 0.2s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .menu-card {
      width: 160px;
      height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--glass);
      border: 1.8px solid rgba(13, 217, 255, 0.1);
      border-radius: var(--card-radius);
      text-decoration: none;
      color: var(--text-main);
      backdrop-filter: blur(12px);
      cursor: pointer;
      position: relative;
      z-index: 2;
      transition: var(--smooth);
      overflow: hidden;
    }

    .menu-card::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(232, 68, 68, 0.1), rgba(13, 217, 255, 0.1));
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }

    .menu-card:hover {
      border-color: rgba(13, 217, 255, 0.4);
      background: rgba(20, 25, 50, 0.3);
      transform: translateY(-8px);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.3), 0 0 20px rgba(13, 217, 255, 0.08);
    }

    .menu-card:hover::before {
      opacity: 1;
    }

    .menu-card:active {
      transform: translateY(-5px) scale(0.98);
    }

    .card-icon {
      font-size: 2.2rem;
      color: var(--neon-cyan);
      transition: var(--smooth);
      z-index: 3;
      position: relative;
    }

    .menu-card:hover .card-icon {
      color: var(--neon-red);
      transform: scale(1.12) rotate(8deg);
      filter: drop-shadow(0 0 8px rgba(232, 68, 68, 0.4));
    }

    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: var(--smooth);
      z-index: 3;
      position: relative;
    }

    .menu-card:hover .card-title {
      color: var(--neon-red);
      letter-spacing: 4px;
    }

    /* ==== FOOTER ==== */
    .footer {
      position: absolute;
      bottom: 18px;
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--text-light);
      opacity: 0.25;
      font-family: 'Orbitron', sans-serif;
      user-select: none;
    }

    /* ==== RESPONSIVE ==== */
    @media (max-width: 800px) {
      .container {
        gap: 35px;
      }
      .menu-card {
        width: 140px;
        height: 140px;
      }
      .card-icon {
        font-size: 2rem;
      }
      .main-logo {
        letter-spacing: 8px;
      }
    }

    @media (max-width: 480px) {
      .container {
        gap: 25px;
        padding: 20px;
      }
      .menu-container {
        gap: 16px;
      }
      .menu-card {
        width: 120px;
        height: 120px;
      }
      .card-icon {
        font-size: 1.8rem;
      }
      .card-title {
        font-size: 0.7rem;
      }
      .description {
        font-size: 0.9rem;
      }
      .main-logo {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Background Glow Effect -->
  <div class="bg-glow">
    <div class="glow-blob blob-1"></div>
    <div class="glow-blob blob-2"></div>
  </div>

  <!-- Main Container -->
  <div class="container">
    <!-- Hero Section -->
    <div class="hero">
      <div class="main-logo">ALAFAN BIKAR</div>
      <div class="tagline">BROTHERHOOD – NO LIMITS</div>
      <div class="description">We create, we laugh, we conquer — unstoppable since 2022.</div>
    </div>

    <!-- Menu Section -->
    <nav class="menu-container">
      <a href="squad" class="menu-card" tabindex="0">
        <i class="fas fa-users-viewfinder card-icon"></i>
        <span class="card-title">SQUAD</span>
      </a>
      <a href="gallery" class="menu-card" tabindex="0">
        <i class="fas fa-camera-retro card-icon"></i>
        <span class="card-title">GALLERY</span>
      </a>
      <a href="calendar" class="menu-card" tabindex="0">
        <i class="fas fa-calendar-check card-icon"></i>
        <span class="card-title">CALENDAR</span>
      </a>
    </nav>
  </div>

  <!-- Footer -->
  <div class="footer">
    ESTABLISHED 2022 — ALAFAN BIKAR
  </div>
</body>
</html>
